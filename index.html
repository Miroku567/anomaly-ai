<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社 ANOMALY INTELLIGENCE | System Override</title>
    <meta name="description" content="AI Automation & System Architecture for Legacy Infrastructure.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="overflow: hidden;">
    <canvas id="matrix-bg"></canvas>
    <div class="overlay"></div>

    <nav>
        <div class="logo">ANOMALY INTELLIGENCE INC.</div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="glitch" data-text="REWRITE THE MATRIX.">REWRITE THE MATRIX.</h1>
            <p class="subtitle">時代遅れのバビロンのレガシー・インフラを、完全なるAIへと解体・再構築する。</p>
            <style>
                .execute-btn:hover, .execute-btn:active {
                    background: #ff0041 !important;
                    color: #000 !important;
                    text-shadow: none !important;
                    box-shadow: 0 0 20px rgba(255, 0, 65, 0.8) !important;
                }
            </style>
            <form id="access-terminal" style="margin-top: 40px; display: flex; flex-direction: column; align-items: center;" action="#">
                <input type="password" id="access-code" placeholder="" autocomplete="off" style="background: rgba(0,0,0,0.5); border: 1px solid var(--accent-primary); color: var(--accent-primary); padding: 15px 20px; font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; text-align: center; width: 300px; outline: none; box-shadow: 0 0 10px rgba(0,255,65,0.2) inset; transition: transform 0.1s; margin-bottom: 5px;">
                <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--accent-primary); opacity: 0.6; letter-spacing: 1px; margin-bottom: 25px;">[ ENTER ACCESS CODE ]</div>
                
                <button type="submit" class="execute-btn" style="background: rgba(255, 0, 65, 0.1); border: 1px solid #ff0041; color: #ff0041; font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; padding: 10px 30px; cursor: pointer; text-shadow: 0 0 5px #ff0041; box-shadow: 0 0 10px rgba(255, 0, 65, 0.2) inset; transition: all 0.2s ease; letter-spacing: 2px;">[ INITIATE OVERRIDE ]</button>
                
                <div id="access-msg" style="color: #ff0041; font-family: 'Share Tech Mono', monospace; margin-top: 15px; height: 20px; text-shadow: 0 0 5px #ff0041;"></div>
            </form>
        </div>
    </header>



    <footer style="position: absolute; bottom: 0; width: 100%; padding: 20px; background: transparent; border: none;">
        <div class="copyright" style="margin-top: 0;">© 2026 株式会社 ANOMALY INTELLIGENCE. The Matrix is Ours.</div>
    </footer>

    <script src="matrix.js"></script>
    <script>
        const form = document.getElementById('access-terminal');
        const codeInput = document.getElementById('access-code');
        const accessMsg = document.getElementById('access-msg');
        
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const code = codeInput.value;
            if (code === '369567') {
                accessMsg.style.color = '#00ff41';
                accessMsg.style.textShadow = '0 0 5px #00ff41';
                accessMsg.innerText = '> ACCESS GRANTED. REDIRECTING...';
                setTimeout(() => {
                    window.location.href = 'core.html';
                }, 1000);
            } else {
                accessMsg.style.color = '#ff0041';
                accessMsg.style.textShadow = '0 0 5px #ff0041';
                accessMsg.innerText = '> ACCESS DENIED';
                codeInput.value = '';
                codeInput.style.transform = 'translateX(-10px)';
                setTimeout(() => codeInput.style.transform = 'translateX(10px)', 50);
                setTimeout(() => codeInput.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => codeInput.style.transform = 'translateX(10px)', 150);
                setTimeout(() => codeInput.style.transform = 'translateX(0)', 200);
                codeInput.blur();
            }
        });
    </script>
</body>
</html>
