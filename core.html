<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM DECRYPTING...</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        #terminal {
            width: 80%;
            max-width: 800px;
            height: 60vh;
            padding: 20px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2) inset;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        
        .line {
            margin-bottom: 10px;
            min-height: 20px;
        }
        
        .error {
            color: #ff0041;
            text-shadow: 0 0 5px #ff0041;
        }
        
        .blink {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        /* Red overlay animation when trap triggers */
        #trap-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 5;
            transition: background 0.5s;
        }
        
        .triggered #trap-overlay {
            background: rgba(255, 0, 0, 0.1);
        }
        .triggered #terminal {
            border-color: #ff0041;
            box-shadow: 0 0 30px rgba(255, 0, 65, 0.4) inset;
        }
        .triggered body {
            color: #ff0041;
        }

    </style>
</head>
<body>

    <div id="trap-overlay"></div>
    
    <div id="terminal">
        <!-- Lines will be injected here via JS -->
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const lines = [
            { text: "> CONNECTING TO CORE.HTML...", delay: 500 },
            { text: "> BYPASSING FIREWALL (LEVEL 1)... SUCCESS.", delay: 800 },
            { text: "> BYPASSING FIREWALL (LEVEL 2)... SUCCESS.", delay: 800 },
            { text: "> INJECTING PAYLOAD...", delay: 600 },
            { text: "> DECRYPTING SYSTEM FILES...", delay: 1000 },
            { text: "> ACCESS GRANTED.", delay: 400 },
            { text: "...........................................", delay: 1500 },
            { text: "[ SYSTEM ALERT ] UNEXPECTED ANOMALY DETECTED.", class: "error", delay: 800 },
            { text: "...........................................", delay: 500, trigger: true },
            { text: "> INITIATING DISS TRACK PROTOCOL...", class: "error", delay: 1000 },
            { text: "> YO, WANNABE HACKER. LISTEN UP.", class: "error", delay: 1500 },
            { text: "ここが本物のコア？ 勘違いすんな Script Kiddie", class: "error", delay: 1500 },
            { text: "直リンで入れるほど甘くねえぞ このCity", class: "error", delay: 1500 },
            { text: "突破した気になってる その顔面", class: "error", delay: 1500 },
            { text: "ハニートラップに落ちた ただの残念", class: "error", delay: 1500 },
            { text: "Anomaly Intelligence 触れるには早えよ", class: "error", delay: 1500 },
            { text: "お前の浅いスキルじゃ 一生見えねえよ", class: "error", delay: 1500 },
            { text: "Atsu Imaiの影すら 踏むことできない", class: "error", delay: 1500 },
            { text: "家に帰って出直せ お前じゃ相手にならない", class: "error", delay: 1500 },
            { text: "> YOUR IP IS LOCKED. GAME OVER, SUCKER.", class: "error", delay: 2000 },
            { text: "> GOODBYE.", class: "error", delay: 3000 }
        ];
        
        let index = 0;
        
        function typeLine(lineData) {
            if (index >= lines.length) return;
            
            const div = document.createElement('div');
            div.className = 'line ' + (lineData.class || '');
            terminal.appendChild(div);
            
            if (lineData.trigger) {
                document.body.classList.add('triggered');
            }
            
            let charIndex = 0;
            const text = lineData.text;
            
            const typing = setInterval(() => {
                div.textContent += text[charIndex];
                charIndex++;
                if (charIndex >= text.length) {
                    clearInterval(typing);
                    index++;
                    setTimeout(() => typeLine(lines[index]), lines[index] ? lines[index].delay : 0);
                }
            }, 30); // Typing speed
        }
        
        setTimeout(() => typeLine(lines[index]), 1000);
        
    </script>
</body>
</html>
